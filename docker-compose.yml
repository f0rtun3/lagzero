services:
  kafka:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    ports:
      - "9092:9092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_KRAFT_CLUSTER_ID: "abcdefghijklmnopqrstuv"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_DELETE_TOPIC_ENABLE: "true"

  lagzero:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      LAGZERO_BOOTSTRAP_SERVERS: kafka:9092
      LAGZERO_CONSUMER_GROUP: ${LAGZERO_CONSUMER_GROUP:-example-consumer-group}
      LAGZERO_TOPICS: ${LAGZERO_TOPICS:-orders}
      LAGZERO_POLL_INTERVAL_SEC: ${LAGZERO_POLL_INTERVAL_SEC:-2}
      LAGZERO_EMITTER: stdout
      LAGZERO_LOG_LEVEL: ${LAGZERO_LOG_LEVEL:-INFO}
      LAGZERO_LAG_SPIKE_MULTIPLIER: ${LAGZERO_LAG_SPIKE_MULTIPLIER:-2.0}
      LAGZERO_STALLED_INTERVALS: ${LAGZERO_STALLED_INTERVALS:-2}
      LAGZERO_IDLE_INTERVALS: ${LAGZERO_IDLE_INTERVALS:-2}
      LAGZERO_RATE_WINDOW_SIZE: ${LAGZERO_RATE_WINDOW_SIZE:-3}
      LAGZERO_STATE_TRANSITION_CONFIRMATIONS: ${LAGZERO_STATE_TRANSITION_CONFIRMATIONS:-1}
      LAGZERO_TIMESTAMP_SAMPLE_INTERVAL_SEC: ${LAGZERO_TIMESTAMP_SAMPLE_INTERVAL_SEC:-5}
      LAGZERO_CORRELATION_RETENTION_SEC: ${LAGZERO_CORRELATION_RETENTION_SEC:-900}
      LAGZERO_DEPLOY_WINDOW_SEC: ${LAGZERO_DEPLOY_WINDOW_SEC:-300}
      LAGZERO_ERROR_WINDOW_SEC: ${LAGZERO_ERROR_WINDOW_SEC:-120}
      LAGZERO_REBALANCE_WINDOW_SEC: ${LAGZERO_REBALANCE_WINDOW_SEC:-90}
      LAGZERO_INFRA_WINDOW_SEC: ${LAGZERO_INFRA_WINDOW_SEC:-300}
      LAGZERO_MAX_CORRELATIONS: ${LAGZERO_MAX_CORRELATIONS:-3}
      LAGZERO_INGEST_ENABLED: "true"
      LAGZERO_INGEST_HOST: 0.0.0.0
      LAGZERO_INGEST_PORT: ${LAGZERO_INGEST_PORT:-8787}
      LAGZERO_INGEST_PATH: ${LAGZERO_INGEST_PATH:-/events}
      LAGZERO_EVENT_LOG_PATH: /var/lagzero/incidents.jsonl
    ports:
      - "${LAGZERO_INGEST_PORT:-8787}:${LAGZERO_INGEST_PORT:-8787}"
    volumes:
      - ${LAGZERO_EVENT_LOG_DIR:-./.chaos/artifacts}:/var/lagzero
    depends_on:
      kafka:
        condition: service_started

  consumer-runner:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    entrypoint: ["/bin/bash", "-lc", "sleep infinity"]
    depends_on:
      kafka:
        condition: service_started
