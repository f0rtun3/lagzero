version: "3.9"

services:
  lagzero:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      LAGZERO_BOOTSTRAP_SERVERS: kafka:9092
      LAGZERO_CONSUMER_GROUP: example-consumer-group
      LAGZERO_TOPICS: orders
      LAGZERO_POLL_INTERVAL_SEC: "10"
      LAGZERO_EMITTER: stdout
      LAGZERO_LOG_LEVEL: INFO
      LAGZERO_LAG_SPIKE_MULTIPLIER: "2.0"
      LAGZERO_STALLED_INTERVALS: "2"
    depends_on:
      kafka:
        condition: service_started

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

